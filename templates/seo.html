{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container">
    <h1 class="page-title text-center">AI SEO & Accessibility Auditor</h1>
    <p class="subtitle text-center" style="margin-bottom: 40px;">Enter any website URL to generate a comprehensive, AI-powered technical analysis.</p>
    
    <div class="dashboard-card" style="max-width: 600px; margin: 0 auto;">
        <form id="audit-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="url" id="target-url" placeholder="https://www.example.com" required 
                   style="padding: 15px; border-radius: 8px; border: 1px solid #444; background: #252525; color: #fff; font-size: 16px; font-family: 'Jost', sans-serif; outline: none;">
            <button type="submit" class="btn primary" id="audit-btn" style="border-radius: 8px; padding: 15px;">Run Audit</button>
        </form>
    </div>
    
    <div id="results-container" class="dashboard-card mt-30" style="max-width: 800px; margin-left: auto; margin-right: auto; display: none;">
        <div class="card-header">
            <h3>Audit Results</h3>
        </div>
        <p id="loading-text" style="color: #007bff; display: none; font-weight: 500;">Scraping website data... this may take a few seconds.</p>
        <div id="audit-output" style="color: #ccc; line-height: 1.6;"></div>
    </div>
</div>

<script>
    document.getElementById('audit-form').addEventListener('submit', async function(e) {
        e.preventDefault(); // Prevent page refresh
        
        const urlInput = document.getElementById('target-url').value;
        const resultsContainer = document.getElementById('results-container');
        const loadingText = document.getElementById('loading-text');
        const output = document.getElementById('audit-output');
        const btn = document.getElementById('audit-btn');
        
        // Show loading state
        resultsContainer.style.display = 'block';
        loadingText.style.display = 'block';
        output.innerHTML = '';
        btn.disabled = true;
        btn.innerText = 'Auditing...';
        btn.style.opacity = '0.7';

        try {
            // Send URL to Python Backend
            const response = await fetch('/api/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput })
            });
            
            const data = await response.json();
            loadingText.style.display = 'none';
            
            if (response.ok) {
                // Display the AI-generated HTML report!
                let htmlContent = `<p style="color: #2ecc71; font-weight: 600; margin-bottom: 25px;">✅ ${data.message}</p>`;
                htmlContent += `<div class="ai-report-content" style="color: #eee;">${data.report}</div>`;
                
                output.innerHTML = htmlContent;
            } else {
                output.innerHTML = `<p style="color: #e74c3c; font-weight: 600;">❌ Error: ${data.error}</p>`;
            }
        } catch (error) {
            loadingText.style.display = 'none';
            output.innerHTML = `<p style="color: #e74c3c; font-weight: 600;">❌ Network Error: Could not connect to the server.</p>`;
        }
        
        // Reset button
        btn.disabled = false;
        btn.innerText = 'Run Audit';
        btn.style.opacity = '1';
    });
</script>
{% endblock %}
