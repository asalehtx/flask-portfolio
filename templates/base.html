<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Saleh | Full Stack Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- Global Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* --- Global Dark Mode & Font Settings --- */
        body, html {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Jost', sans-serif;
            width: 100%;
            height: 100%;
        }

        h1, h2, h3, h4, h5, h6, .logo {
            font-family: 'Poppins', sans-serif;
        }

        /* --- Global Fixed Navbar --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(18, 18, 18, 0.85); 
            backdrop-filter: blur(10px);        
            z-index: 2000; 
        }

        .logo { font-size: 24px; font-weight: 700; color: #ffffff; text-decoration: none; }
        .logo span { color: #007bff; }
        .nav-links { list-style: none; display: flex; gap: 30px; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #007bff; }

        /* ========================================= */
        /* --- GLOBAL ANIMATION CLASSES --- */
        /* ========================================= */
        .animate-on-scroll {
            opacity: 0; 
            transform: translateY(40px); 
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
            will-change: opacity, transform; 
        }

        .animate-on-scroll.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Staggered Delays */
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }
        .delay-4 { transition-delay: 0.4s; }
        .delay-5 { transition-delay: 0.5s; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="logo">Adam<span>.</span></a>
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}#hero">Home</a></li>
            <li><a href="{{ url_for('home') }}#about">About</a></li>
            <li><a href="{{ url_for('home') }}#projects">Projects</a></li>
            <li><a href="{{ url_for('home') }}#contact">Contact</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('show');
                    } else {
                        // Elements will fade out when scrolled past, ready to animate in again
                        entry.target.classList.remove('show'); 
                    }
                });
            }, {
                threshold: 0.15
            });

            // Re-run the observer check whenever the DOM changes 
            // (helpful if you add dynamic content later!)
            const observeElements = () => {
                const hiddenElements = document.querySelectorAll('.animate-on-scroll');
                hiddenElements.forEach((el) => observer.observe(el));
            };

            observeElements();
        });
    </script>
</body>
</html>
