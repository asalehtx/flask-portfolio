<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Saleh | Full Stack Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="logo">HearHear<span>.</span></a>
        
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-links" id="nav-menu">
            <li><a href="{{ url_for('home') }}#hero" onclick="closeMenu()">Home</a></li>
            <li><a href="{{ url_for('home') }}#about" onclick="closeMenu()">About</a></li>
            <li><a href="{{ url_for('home') }}#projects" onclick="closeMenu()">Projects</a></li>
            <li><a href="{{ url_for('home') }}#contact" onclick="closeMenu()">Contact</a></li>
        </ul>
    </nav>

    {% block content %}{% endblock %}

    <script>
        function toggleMenu() {
            const navMenu = document.getElementById('nav-menu');
            const hamburger = document.querySelector('.hamburger');
            
            navMenu.classList.toggle('active');
            hamburger.classList.toggle('active');
        }

        // This ensures the menu automatically folds away when the user taps a link
        function closeMenu() {
            const navMenu = document.getElementById('nav-menu');
            const hamburger = document.querySelector('.hamburger');
            
            if (navMenu.classList.contains('active')) {
                navMenu.classList.remove('active');
                hamburger.classList.remove('active');
            }
        }
    </script>
</body>
</html>
