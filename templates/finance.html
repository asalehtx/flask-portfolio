{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container">
    <h1 class="page-title">Personal Finance Tracker</h1>
    
    <div id="alert-box" class="alerts"></div>

    <div class="summary-cards">
        <div class="stat-card">
            <span class="stat-label">Income</span>
            <span class="stat-value text-green">$<span id="tot-income">0.00</span></span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Expenses</span>
            <span class="stat-value text-red">$<span id="tot-expenses">0.00</span></span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Net Net</span>
            <span class="stat-value text-blue">$<span id="tot-net">0.00</span></span>
        </div>
    </div>

    <div class="dashboard-grid">
        
        <div class="dashboard-card form-container">
            <h3>Add Transaction</h3>
            <form id="transaction-form">
                <label>Type:</label>
                <select id="t-type" required>
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>

                <label>Amount ($):</label>
                <input type="number" id="t-amount" step="0.01" required>

                <label>Category:</label>
                <input type="text" id="t-category" required>

                <label>Date:</label>
                <input type="date" id="t-date" required>

                <button type="submit" class="btn primary w-100">Add Transaction</button>
            </form>
        </div>

        <div class="dashboard-card flex-center">
            <div class="chart-wrapper">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

    </div>

    <div class="dashboard-card mt-30">
        <div class="card-header">
            <h3>Spending Trends</h3>
            <div class="toggle-group">
                <button id="btn-monthly" class="toggle-btn active" onclick="setTrendView('monthly')">Monthly</button>
                <button id="btn-yearly" class="toggle-btn" onclick="setTrendView('yearly')">Yearly</button>
            </div>
        </div>
        <div class="trend-chart-wrapper">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="dashboard-card mt-30 table-wrapper">
        <div class="card-header">
            <h3>Transaction History</h3>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="transaction-table-body">
                </tbody>
        </table>
    </div>
    
    <div class="dashboard-footer">
        <a href="{{ url_for('export_transactions_csv') }}" class="btn outline" target="_blank">Download CSV Report</a>
        <br><br>
        <a href="{{ url_for('home') }}#projects" class="back-link">&larr; Back to Projects</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // GLOBAL CHART.JS DARK MODE FIX
    Chart.defaults.color = '#cccccc';
    Chart.defaults.borderColor = '#333333';

    let expenseChartInstance = null;
    let trendChartInstance = null; 
    let editingTransactionId = null;
    let currentTransactions = [];
    let currentTrendView = 'monthly';

    function renderTrendChart() {
        const expenses = currentTransactions.filter(t => t.type === 'expense');
        const groupedData = {};
        
        expenses.forEach(t => {
            let key = currentTrendView === 'monthly' ? t.date.substring(0, 7) : t.date.substring(0, 4);
            groupedData[key] = (groupedData[key] || 0) + t.amount;
        });

        const labels = Object.keys(groupedData).sort();
        const dataPoints = labels.map(label => groupedData[label]);

        if (trendChartInstance) trendChartInstance.destroy();

        const ctx = document.getElementById('trendChart').getContext('2d');
        trendChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Expenses ($)',
                    data: dataPoints,
                    borderColor: '#e74c3c', 
                    backgroundColor: 'rgba(231, 76, 60, 0.2)',
                    fill: true,
                    tension: 0.4 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Update Toggle Buttons
        document.getElementById('btn-monthly').className = currentTrendView === 'monthly' ? 'toggle-btn active' : 'toggle-btn';
        document.getElementById('btn-yearly').className = currentTrendView === 'yearly' ? 'toggle-btn active' : 'toggle-btn';
    }

    function setTrendView(view) {
        currentTrendView = view;
        renderTrendChart();
    }

    function loadDashboard() {
        fetch('/api/finance/summary')
            .then(response => response.json())
            .then(data => {
                document.getElementById('tot-income').innerText = data.summary.total_income.toFixed(2);
                document.getElementById('tot-expenses').innerText = data.summary.total_expenses.toFixed(2);
                document.getElementById('tot-net').innerText = data.summary.net_savings.toFixed(2);

                const alertBox = document.getElementById('alert-box');
                alertBox.innerHTML = '';
                if (data.budget_alerts.length > 0) {
                    data.budget_alerts.forEach(alertMsg => {
                        let p = document.createElement('p');
                        p.textContent = '⚠️ ' + alertMsg;
                        p.style.color = '#e74c3c';
                        alertBox.appendChild(p);
                    });
                }

                const categories = Object.keys(data.chart_data);
                const amounts = Object.values(data.chart_data);
                const ctx = document.getElementById('expenseChart').getContext('2d');

                if (expenseChartInstance) expenseChartInstance.destroy();

                expenseChartInstance = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: categories,
                        datasets: [{
                            label: 'Amount Spent ($)',
                            data: amounts,
                            // Modern color palette
                            backgroundColor: ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6'],
                            borderWidth: 0
                        }]
                    },
                    options: { responsive: true }
                });

                currentTransactions = data.transactions;
                renderTrendChart();
                
                const tableBody = document.getElementById('transaction-table-body');
                tableBody.innerHTML = ''; 

                const sortedTransactions = [...data.transactions].reverse();

                sortedTransactions.forEach(t => {
                    const tr = document.createElement('tr');
                    const amountColor = t.type === 'income' ? '#2ecc71' : '#e74c3c';
                    const prefix = t.type === 'income' ? '+' : '-';

                    tr.innerHTML = `
                        <td data-label="Date" style="color: #ccc;">${t.date}</td>
                        <td data-label="Category" class="fw-bold">${t.category}</td>
                        <td data-label="Type" class="capitalize" style="color: #aaa;">${t.type}</td>
                        <td data-label="Amount" class="fw-bold" style="color: ${amountColor};">
                            ${prefix}$${t.amount.toFixed(2)}
                        </td>
                        <td data-label="Actions" class="actions-cell">
                            <button onclick="startEdit(${t.id}, '${t.type}', ${t.amount}, '${t.category}', '${t.date}')" class="btn btn-warning">Edit</button>
                            <button onclick="deleteTransaction(${t.id})" class="btn btn-danger">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            })
            .catch(err => console.error('Error fetching dashboard data:', err));
    }

    document.getElementById('transaction-form').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const payload = {
            type: document.getElementById('t-type').value,
            amount: document.getElementById('t-amount').value,
            category: document.getElementById('t-category').value,
            date: document.getElementById('t-date').value
        };

        const url = editingTransactionId ? `/api/finance/transactions/${editingTransactionId}` : '/api/finance/transactions';
        const method = editingTransactionId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(result => {
            document.getElementById('transaction-form').reset();
            editingTransactionId = null;
            
            const submitBtn = document.querySelector('#transaction-form button[type="submit"]');
            submitBtn.textContent = "Add Transaction";
            submitBtn.className = "btn primary w-100"; 
            
            loadDashboard();
        })
        .catch(err => console.error('Error saving transaction:', err));
    });

    function deleteTransaction(id) {
        if (!confirm("Are you sure you want to delete this transaction?")) return;
        
        fetch(`/api/finance/transactions/${id}`, { method: 'DELETE' })
            .then(response => response.json())
            .then(data => loadDashboard())
            .catch(err => console.error('Error deleting:', err));
    }

    function startEdit(id, type, amount, category, date) {
        editingTransactionId = id; 
        
        document.getElementById('t-type').value = type;
        document.getElementById('t-amount').value = amount;
        document.getElementById('t-category').value = category;
        document.getElementById('t-date').value = date;
        
        const submitBtn = document.querySelector('#transaction-form button[type="submit"]');
        submitBtn.textContent = "Update Transaction";
        submitBtn.className = "btn btn-warning w-100"; 
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadDashboard();
</script>
{% endblock %}
