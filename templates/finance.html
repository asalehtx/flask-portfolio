{% extends 'base.html' %}

{% block content %}
<div class="dashboard-container">
    <h1 class="page-title">Personal Finance Tracker</h1>
    
    <div id="alert-box" class="alerts"></div>

    <div class="summary-cards">
        <div class="stat-card">
            <span class="stat-label">Income</span>
            <span class="stat-value text-green">$<span id="tot-income">0.00</span></span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Expenses</span>
            <span class="stat-value text-red">$<span id="tot-expenses">0.00</span></span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Net Net</span>
            <span class="stat-value text-blue">$<span id="tot-net">0.00</span></span>
        </div>
    </div>

    <div class="dashboard-grid">
        
        <div class="dashboard-card form-container">
            <h3>Add Transaction</h3>
            <form id="transaction-form">
                <label>Type:</label>
                <select id="t-type" required>
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>

                <label>Amount ($):</label>
                <input type="number" id="t-amount" step="0.01" required>

                <label>Category:</label>
                <input type="text" id="t-category" required>

                <label>Date:</label>
                <input type="date" id="t-date" required>

                <button type="submit" class="btn primary w-100">Add Transaction</button>
            </form>
        </div>

        <div class="dashboard-card flex-center">
            <div class="chart-wrapper">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

    </div>

    <div class="dashboard-card mt-30">
        <div class="card-header">
            <h3>Spending Trends</h3>
            <div class="toggle-group">
                <button id="btn-monthly" class="toggle-btn active" onclick="setTrendView('monthly')">Monthly</button>
                <button id="btn-yearly" class="toggle-btn" onclick="setTrendView('yearly')">Yearly</button>
            </div>
        </div>
        <div class="trend-chart-wrapper">
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="dashboard-card mt-30 table-wrapper">
        <div class="card-header">
            <h3>Transaction History</h3>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="transaction-table-body">
                </tbody>
        </table>
    </div>
    
    <div class="dashboard-footer">
        <a href="{{ url_for('export_transactions_csv') }}" class="btn outline" target="_blank">Download CSV Report</a>
        <br><br>
        <a href="{{ url_for('home') }}#projects" class="back-link">&larr; Back to Projects</a>
    </div>
</div>

<style>
    /* --- Main Container Layout --- */
    .dashboard-container {
        max-width: 1000px;
        margin: 120px auto 50px auto; /* Clears the fixed navbar */
        padding: 0 20px;
    }

    .page-title {
        font-size: 36px;
        margin-bottom: 25px;
        color: #fff;
    }

    .alerts p { margin-bottom: 15px; font-weight: 500; }

    /* --- Summary Cards --- */
    .summary-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: #1a1a1a;
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .stat-label { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; font-family: 'Poppins', sans-serif; }
    
    .text-green { color: #2ecc71; }
    .text-red { color: #e74c3c; }
    .text-blue { color: #3498db; }

    /* --- Reusable Dashboard Cards --- */
    .dashboard-card {
        background: #1a1a1a;
        border-radius: 12px;
        border: 1px solid #333;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .mt-30 { margin-top: 30px; }
    
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #333;
        padding-bottom: 15px;
        margin-bottom: 20px;
    }
    
    .card-header h3 { margin: 0; color: #fff; font-size: 20px; }

    /* --- Form Elements --- */
    .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 30px;
    }

    .form-container h3 {
        margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px;
    }

    form label { display: block; margin-bottom: 8px; font-weight: 500; color: #ccc; font-size: 14px; }
    form select, form input {
        width: 100%; margin-bottom: 20px; padding: 12px; border-radius: 8px;
        border: 1px solid #444; background: #252525; color: #fff; font-family: 'Jost', sans-serif;
    }
    form select:focus, form input:focus { outline: none; border-color: #007bff; }

    /* --- Buttons --- */
    .btn { 
        padding: 12px 24px; border-radius: 8px; text-decoration: none; 
        font-weight: 600; cursor: pointer; transition: all 0.3s ease; border: none; font-size: 15px;
    }
    .w-100 { width: 100%; display: block; }
    .primary { background: #007bff; color: #fff; }
    .primary:hover { background: #0056b3; transform: translateY(-2px); }
    .btn-warning { background: #f39c12; color: #fff; }
    .btn-danger { background: #e74c3c; color: #fff; }
    
    .outline { border: 2px solid #007bff; color: #007bff; background: transparent; display: inline-block; border-radius: 30px; }
    .outline:hover { background: #007bff; color: #fff; transform: translateY(-2px); }

    .toggle-group { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
    .toggle-btn {
        background: #252525; color: #888; padding: 8px 16px; border: none; cursor: pointer; font-weight: 600;
    }
    .toggle-btn.active { background: #007bff; color: #fff; }

    /* --- Charts --- */
    .flex-center { display: flex; justify-content: center; align-items: center; }
    .chart-wrapper { width: 100%; max-width: 350px; }
    .trend-chart-wrapper { width: 100%; height: 300px; }

    /* --- Table Styles --- */
    .table-wrapper { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; text-align: left; }
    .data-table th { padding: 15px; background-color: #252525; color: #ccc; font-weight: 600; border-bottom: 2px solid #333; }
    .data-table td { padding: 15px; border-bottom: 1px solid #333; color: #eee; }
    .capitalize { text-transform: capitalize; }
    .fw-bold { font-weight: bold; }
    .actions-cell button { margin-right: 8px; padding: 6px 12px; border-radius: 4px; font-size: 13px; }

    /* --- Footer --- */
    .dashboard-footer { text-align: center; margin-top: 40px; }
    .back-link { color: #888; text-decoration: none; font-weight: 600; transition: color 0.3s; font-size: 15px; }
    .back-link:hover { color: #ffffff; }

    /* Mobile Table Card Layout */
    @media screen and (max-width: 768px) {
        .data-table, .data-table tbody, .data-table tr, .data-table td { display: block; width: 100%; box-sizing: border-box; }
        .data-table thead { display: none; }
        .data-table tr { margin-bottom: 15px; background: #252525; border: 1px solid #444; border-radius: 8px; padding: 10px; }
        .data-table td { text-align: right; border-bottom: 1px solid #333; position: relative; padding: 10px 15px; }
        .data-table td:last-child { border-bottom: 0; text-align: right; }
        .data-table td::before {
            content: attr(data-label); position: absolute; left: 15px; width: 45%; text-align: left; font-weight: 600; color: #888;
        }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // GLOBAL CHART.JS DARK MODE FIX
    Chart.defaults.color = '#cccccc';
    Chart.defaults.borderColor = '#333333';

    let expenseChartInstance = null;
    let trendChartInstance = null; 
    let editingTransactionId = null;
    let currentTransactions = [];
    let currentTrendView = 'monthly';

    function renderTrendChart() {
        const expenses = currentTransactions.filter(t => t.type === 'expense');
        const groupedData = {};
        
        expenses.forEach(t => {
            let key = currentTrendView === 'monthly' ? t.date.substring(0, 7) : t.date.substring(0, 4);
            groupedData[key] = (groupedData[key] || 0) + t.amount;
        });

        const labels = Object.keys(groupedData).sort();
        const dataPoints = labels.map(label => groupedData[label]);

        if (trendChartInstance) trendChartInstance.destroy();

        const ctx = document.getElementById('trendChart').getContext('2d');
        trendChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Expenses ($)',
                    data: dataPoints,
                    borderColor: '#e74c3c', 
                    backgroundColor: 'rgba(231, 76, 60, 0.2)',
                    fill: true,
                    tension: 0.4 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Update Toggle Buttons
        document.getElementById('btn-monthly').className = currentTrendView === 'monthly' ? 'toggle-btn active' : 'toggle-btn';
        document.getElementById('btn-yearly').className = currentTrendView === 'yearly' ? 'toggle-btn active' : 'toggle-btn';
    }

    function setTrendView(view) {
        currentTrendView = view;
        renderTrendChart();
    }

    function loadDashboard() {
        fetch('/api/finance/summary')
            .then(response => response.json())
            .then(data => {
                document.getElementById('tot-income').innerText = data.summary.total_income.toFixed(2);
                document.getElementById('tot-expenses').innerText = data.summary.total_expenses.toFixed(2);
                document.getElementById('tot-net').innerText = data.summary.net_savings.toFixed(2);

                const alertBox = document.getElementById('alert-box');
                alertBox.innerHTML = '';
                if (data.budget_alerts.length > 0) {
                    data.budget_alerts.forEach(alertMsg => {
                        let p = document.createElement('p');
                        p.textContent = '⚠️ ' + alertMsg;
                        p.style.color = '#e74c3c';
                        alertBox.appendChild(p);
                    });
                }

                const categories = Object.keys(data.chart_data);
                const amounts = Object.values(data.chart_data);
                const ctx = document.getElementById('expenseChart').getContext('2d');

                if (expenseChartInstance) expenseChartInstance.destroy();

                expenseChartInstance = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: categories,
                        datasets: [{
                            label: 'Amount Spent ($)',
                            data: amounts,
                            // Modern color palette
                            backgroundColor: ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6'],
                            borderWidth: 0
                        }]
                    },
                    options: { responsive: true }
                });

                currentTransactions = data.transactions;
                renderTrendChart();
                
                const tableBody = document.getElementById('transaction-table-body');
                tableBody.innerHTML = ''; 

                const sortedTransactions = [...data.transactions].reverse();

                sortedTransactions.forEach(t => {
                    const tr = document.createElement('tr');
                    const amountColor = t.type === 'income' ? '#2ecc71' : '#e74c3c';
                    const prefix = t.type === 'income' ? '+' : '-';

                    tr.innerHTML = `
                        <td data-label="Date" style="color: #ccc;">${t.date}</td>
                        <td data-label="Category" class="fw-bold">${t.category}</td>
                        <td data-label="Type" class="capitalize" style="color: #aaa;">${t.type}</td>
                        <td data-label="Amount" class="fw-bold" style="color: ${amountColor};">
                            ${prefix}$${t.amount.toFixed(2)}
                        </td>
                        <td data-label="Actions" class="actions-cell">
                            <button onclick="startEdit(${t.id}, '${t.type}', ${t.amount}, '${t.category}', '${t.date}')" class="btn btn-warning">Edit</button>
                            <button onclick="deleteTransaction(${t.id})" class="btn btn-danger">Delete</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            })
            .catch(err => console.error('Error fetching dashboard data:', err));
    }

    document.getElementById('transaction-form').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const payload = {
            type: document.getElementById('t-type').value,
            amount: document.getElementById('t-amount').value,
            category: document.getElementById('t-category').value,
            date: document.getElementById('t-date').value
        };

        const url = editingTransactionId ? `/api/finance/transactions/${editingTransactionId}` : '/api/finance/transactions';
        const method = editingTransactionId ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(result => {
            document.getElementById('transaction-form').reset();
            editingTransactionId = null;
            
            const submitBtn = document.querySelector('#transaction-form button[type="submit"]');
            submitBtn.textContent = "Add Transaction";
            submitBtn.className = "btn primary w-100"; 
            
            loadDashboard();
        })
        .catch(err => console.error('Error saving transaction:', err));
    });

    function deleteTransaction(id) {
        if (!confirm("Are you sure you want to delete this transaction?")) return;
        
        fetch(`/api/finance/transactions/${id}`, { method: 'DELETE' })
            .then(response => response.json())
            .then(data => loadDashboard())
            .catch(err => console.error('Error deleting:', err));
    }

    function startEdit(id, type, amount, category, date) {
        editingTransactionId = id; 
        
        document.getElementById('t-type').value = type;
        document.getElementById('t-amount').value = amount;
        document.getElementById('t-category').value = category;
        document.getElementById('t-date').value = date;
        
        const submitBtn = document.querySelector('#transaction-form button[type="submit"]');
        submitBtn.textContent = "Update Transaction";
        submitBtn.className = "btn btn-warning w-100"; 
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadDashboard();
</script>
{% endblock %}
